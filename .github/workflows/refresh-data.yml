name: Refresh World Cup Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape Wikipedia data
        run: python3 scripts/fetch_data.py

      - name: Set last_updated timestamp
        run: |
          TS=$(date -u +"%Y-%m-%d %H:%M UTC")
          python3 -c "import json; d=json.load(open('data/data.json')); d['last_updated']='$TS'; json.dump(d, open('data/data.json','w'), indent=2)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "data: auto-refresh World Cup standings"
            git push
          fi
